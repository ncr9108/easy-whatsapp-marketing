version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: easy_whatsapp_db
    restart: always
    environment:
      POSTGRES_USER: shopify_user
      POSTGRES_PASSWORD: shopify_password
      POSTGRES_DB: easy_whatsapp_marketing
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/database/schema.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    container_name: easy_whatsapp_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
